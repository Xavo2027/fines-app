{% extends "base.html" %}{% block content %}
<h3>Iniciar sesión</h3>{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form method="POST"><div class="mb-3"><label>DNI</label>
<input type="text" name="dni" class="form-control" required></div>
<div class="mb-3"><label>Contraseña</label>
<input type="password" name="password" class="form-control" required></div>
<button type="submit" class="btn btn-primary">Ingresar</button></form>{% endblock %}
